[main]
# The keyword prefix that triggers cheatsheet search.
# * Type the keyword followed by a space, then your search terms.
# * All terms must match (AND logic). The full raw line is searched.
# * Type: String
# * Default: cht
#keyword = cht

# Comment prefixes in cheatsheet files.
# * Semicolon-separated. A line starting with any of these is skipped.
# * rofi-shortcuts.conf uses # for regular comments and ## for special
#   comments; both are supported by default.
# * Type: Semicolon-separated
# * Default: #;##
#comment_prefix = #;##

# Maximum display length of cheat descriptions in the results list.
# * Accepts a plain integer (character count) or a percentage string (e.g.
#   "20%") calculated from screen width.
# * Default: 20%
#max_desc_len = 20%

# Individual cheatsheet files to load.
# * Semicolon-separated paths. Supports ${env:VAR}, ${knownfolder:GUID} and ~.
# * Default: empty
#files =
#    ~/.cheatsheet/example.cht

# Directories to scan for cheatsheet files (recursive).
# * Semicolon-separated. Supports ${env:VAR}, ${knownfolder:GUID} and ~.
# * Default: empty
directories =
    ${env:USERPROFILE}/.cheatsheet

# File name globs to include when scanning directories.
# * Semicolon-separated, matched via fnmatch.
# * Default: *.conf;*.cht
#include = *.conf;*.cht

# File and directory name patterns to exclude.
# * Semicolon-separated. A pattern ending with / matches directory names;
#   others match file names via fnmatch.
# * Default: empty
#exclude = *_arch;*.bak

# Show a notification when a shortcut is copied to clipboard.
# * Type: Boolean
# * Default: true
#notify = true

# --- Cheatsheet file format ---
# Compatible with rofi-shortcuts.conf format.
# Each non-empty, non-comment line is one shortcut:
#   description | key
#
# * Fields are separated by | (\| to include a literal |)
# * First field: description (only one)
# * Second field: shortcut key (only one)
# * Lines starting with any comment_prefix are ignored
#
# Example (see data/example.cht):
#   # Clink keybindings
#   clink: Help                 | A-h
#   clink: Clear the input line | Esc
#
# Type keyword followed by space, then search terms:
#   cht help          Matches "help"
#   cht clear line    Matches both "clear" AND "line"
