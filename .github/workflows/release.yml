name: Release

on:
  push:
    tags: ["*"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6
        with:
          persist-credentials: false

      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Build package
        run: make

      - name: Generate SHA256 checksums
        run: sha256sum dist/CheatsheetTxt.keypirinha-package > dist/CheatsheetTxt.keypirinha-package.sha256

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            dist/CheatsheetTxt.keypirinha-package \
            dist/CheatsheetTxt.keypirinha-package.sha256 \
            --title "$TAG_NAME" \
            --generate-notes